<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Power Gauge Card · Local preview</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <style>
      :root {
        --bg-0: #05070d;
        --bg-1: #0a0f1c;
        --bg-2: #111b30;
        --text: #eef3ff;
        --muted: #6b7894;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: radial-gradient(ellipse at 50% 30%, var(--bg-2), var(--bg-0) 70%);
        color: var(--text);
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(1px 1px at 20% 30%, rgba(255, 255, 255, 0.6), transparent),
          radial-gradient(1px 1px at 70% 60%, rgba(255, 255, 255, 0.4), transparent),
          radial-gradient(1px 1px at 40% 80%, rgba(255, 255, 255, 0.5), transparent),
          radial-gradient(1px 1px at 85% 20%, rgba(255, 255, 255, 0.3), transparent),
          radial-gradient(1px 1px at 15% 70%, rgba(255, 255, 255, 0.4), transparent);
        opacity: 0.35;
      }
      .layout {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 48px;
        display: grid;
        gap: 24px;
        grid-template-columns: 1fr;
        align-items: start;
      }
      @media (min-width: 880px) {
        .layout {
          grid-template-columns: 360px 1fr;
          padding: 32px 24px 48px;
          gap: 32px;
        }
        .preview {
          order: 2;
        }
        .controls {
          order: 1;
        }
      }
      .preview {
        order: 1;
      }
      .controls {
        order: 2;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.3px;
        margin: 0 0 4px;
      }
      .sub {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 20px;
      }
      .controls {
        background: linear-gradient(180deg, #0b1326, #060a14);
        border: 1px solid rgba(120, 160, 220, 0.12);
        border-radius: 18px;
        padding: 22px 22px 18px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
      }
      label {
        display: block;
        margin: 14px 0 6px;
        font-size: 10px;
        letter-spacing: 1.6px;
        color: var(--muted);
        text-transform: uppercase;
        font-weight: 600;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      input[type='range'] {
        flex: 1;
        accent-color: #1ee0ff;
      }
      input[type='number'],
      input[type='text'] {
        width: 100%;
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        color: var(--text);
        font-family: inherit;
        font-variant-numeric: tabular-nums;
      }
      input[type='color'] {
        width: 40px;
        height: 36px;
        padding: 0;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        cursor: pointer;
      }
      .value-display {
        font-variant-numeric: tabular-nums;
        font-size: 14px;
        color: var(--text);
        min-width: 70px;
        text-align: right;
      }
      .level-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 10px;
        background: linear-gradient(180deg, #1ee0ff, #2a7bff);
        border: 0;
        border-radius: 8px;
        color: #001023;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover {
        filter: brightness(1.08);
      }
      .preview {
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
        min-height: 480px;
      }
      .card-frame {
        width: 100%;
        max-width: 360px;
      }
      .preview-label {
        font-size: 10px;
        letter-spacing: 1.6px;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 600;
        align-self: flex-start;
      }
      .footnote {
        margin-top: 16px;
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
      }
      code {
        font-family: 'SF Mono', Menlo, monospace;
        font-size: 11px;
        background: rgba(255, 255, 255, 0.06);
        padding: 1px 5px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="controls">
        <h1>Power Gauge — Preview</h1>
        <div class="sub">Local sandbox · no Home Assistant required</div>

        <label for="value">Value (live)</label>
        <div class="row">
          <input type="range" id="value" min="0" max="5000" value="1240" step="10" />
          <span class="value-display" id="value-display">1240</span>
        </div>

        <label>Range</label>
        <div class="level-row">
          <input type="number" id="min" value="0" />
          <input type="number" id="max" value="5000" />
        </div>

        <label>Normal threshold &amp; color</label>
        <div class="level-row">
          <input type="number" id="normal" value="1000" />
          <input type="color" id="normal_color" value="#1ee0ff" />
        </div>

        <label>Warning threshold &amp; color</label>
        <div class="level-row">
          <input type="number" id="warning" value="3000" />
          <input type="color" id="warning_color" value="#ff7a2b" />
        </div>

        <label>Critical threshold &amp; color</label>
        <div class="level-row">
          <input type="number" id="critical" value="5000" />
          <input type="color" id="critical_color" value="#ff1a3c" />
        </div>

        <label>Display</label>
        <div class="level-row">
          <input type="text" id="name" value="Electricity Consumption" placeholder="Name" />
          <input type="text" id="unit" value="W" placeholder="Unit" style="width: 64px" />
        </div>

        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer">
          <input type="checkbox" id="rolling_numbers" checked style="margin: 0" />
          <span style="font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase">
            Rolling numbers
          </span>
        </label>

        <label>Background</label>
        <select id="background_preset" style="width: 100%; padding: 8px 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: var(--text); font-family: inherit;">
          <option value="">Default (signature gradient)</option>
          <option value="transparent">Transparent (HA theme adopts)</option>
          <option value="#1a1a2e">Solid #1a1a2e (deep indigo)</option>
          <option value="linear-gradient(180deg, #2d0050, #0a0014)">Magenta gradient</option>
          <option value="#f5f5f7">Light grey #f5f5f7 (test light bg)</option>
          <option value="custom">Custom (type below)…</option>
        </select>
        <input type="text" id="background" placeholder="Custom CSS color or gradient" style="margin-top: 6px; display: none" />

        <button id="auto">▶ Auto drift</button>

        <div class="footnote">
          Adjust the slider to see the gauge ramp through the configured levels. Run
          <code>npm run dev</code> to enable live rebuild on source changes.
        </div>
      </div>

      <div class="preview">
        <div class="preview-label">Radial gauge</div>
        <div class="card-frame" id="card-frame"></div>
        <div class="preview-label" style="margin-top: 12px">Bar gauge (multi-entity)</div>
        <div class="card-frame" id="bar-frame"></div>
      </div>
    </div>

    <!--
      Stub <ha-card> BEFORE loading the gauge bundle so the gauge's first
      render finds it already defined. Plain script tags work over file://.
    -->
    <script>
      class HaCardStub extends HTMLElement {
        constructor() {
          super();
          this.attachShadow({ mode: 'open' });
          this.shadowRoot.innerHTML =
            '<style>:host{display:block;background:var(--ha-card-background,transparent);border-radius:var(--ha-card-border-radius,16px)}</style><slot></slot>';
        }
      }
      if (!customElements.get('ha-card')) {
        customElements.define('ha-card', HaCardStub);
      }
    </script>

    <!--
      IIFE build of the gauge — loaded as a classic script so this page
      works whether opened via http(s):// (npm run dev/serve) or directly
      off disk via file://. Browsers refuse ES module imports over file://.
    -->
    <script src="../dist/ha-power-gauge.iife.js"></script>

    <script>
      const card = document.createElement('power-gauge-card');
      document.getElementById('card-frame').appendChild(card);

      const barCard = document.createElement('power-gauge-bar-card');
      document.getElementById('bar-frame').appendChild(barCard);

      const BAR_DEMO_ENTITIES = [
        { id: 'sensor.demo_living_room', name: 'Living room', base: 1240 },
        { id: 'sensor.demo_kitchen', name: 'Kitchen', base: 2900 },
        { id: 'sensor.demo_hvac', name: 'HVAC', base: 3850 },
        { id: 'sensor.demo_ev', name: 'EV charger', base: 4600 },
        { id: 'sensor.demo_office', name: 'Office', base: 420 },
      ];

      const ids = [
        'value',
        'min',
        'max',
        'normal',
        'warning',
        'critical',
        'normal_color',
        'warning_color',
        'critical_color',
        'name',
        'unit',
        'rolling_numbers',
        'background_preset',
        'background',
      ];
      const $ = (id) => document.getElementById(id);
      const num = (id) => Number($(id).value);
      const str = (id) => $(id).value;
      const bool = (id) => $(id).checked;
      const resolveBackground = () => {
        const preset = str('background_preset');
        const customField = $('background');
        customField.style.display = preset === 'custom' ? '' : 'none';
        if (preset === 'custom') return str('background').trim() || undefined;
        return preset || undefined; // empty preset = default (no override)
      };

      function rebuild() {
        const max = num('max');
        const slider = $('value');
        slider.max = String(max);
        slider.min = String(num('min'));
        $('value-display').textContent = num('value').toLocaleString();

        const sharedConfig = {
          unit: str('unit'),
          min: num('min'),
          max,
          normal: num('normal'),
          warning: num('warning'),
          critical: num('critical'),
          normal_color: str('normal_color'),
          warning_color: str('warning_color'),
          critical_color: str('critical_color'),
          rolling_numbers: bool('rolling_numbers'),
          background: resolveBackground(),
        };
        card.setConfig({
          type: 'custom:power-gauge-card',
          entity: 'sensor.demo_power',
          name: str('name'),
          ...sharedConfig,
        });
        barCard.setConfig({
          type: 'custom:power-gauge-bar-card',
          title: 'Per-room consumption',
          entities: BAR_DEMO_ENTITIES.map((e) => ({ entity: e.id, name: e.name })),
          ...sharedConfig,
        });
        pushHass();
      }

      function pushHass() {
        const sliderValue = num('value');
        const states = {
          'sensor.demo_power': {
            entity_id: 'sensor.demo_power',
            state: String(sliderValue),
            attributes: {
              friendly_name: str('name') || 'Demo Power',
              unit_of_measurement: str('unit') || 'W',
            },
          },
        };
        // Spread the slider value across the per-room rows so they shift
        // through their colour bands together as the slider moves.
        const totalBase = BAR_DEMO_ENTITIES.reduce((s, e) => s + e.base, 0);
        for (const e of BAR_DEMO_ENTITIES) {
          states[e.id] = {
            entity_id: e.id,
            state: String(Math.round((sliderValue * e.base) / Math.max(1, totalBase / 5))),
            attributes: {
              friendly_name: e.name,
              unit_of_measurement: str('unit') || 'W',
            },
          };
        }
        const hass = {
          states,
          themes: { darkMode: true },
          language: 'en',
          callService: async () => {},
        };
        card.hass = hass;
        barCard.hass = hass;
      }

      // Wire inputs
      $('value').addEventListener('input', () => {
        $('value-display').textContent = num('value').toLocaleString();
        pushHass();
      });
      ids
        .filter((id) => id !== 'value')
        .forEach((id) => {
          $(id).addEventListener('input', rebuild);
          $(id).addEventListener('change', rebuild);
        });

      // Auto drift
      let timer;
      $('auto').addEventListener('click', (e) => {
        if (timer) {
          clearInterval(timer);
          timer = undefined;
          e.target.textContent = '▶ Auto drift';
          return;
        }
        e.target.textContent = '⏸ Stop drift';
        timer = setInterval(() => {
          const max = num('max');
          const next = Math.max(
            0,
            Math.min(max, num('value') + (Math.random() - 0.5) * (max * 0.12)),
          );
          $('value').value = String(Math.round(next));
          $('value-display').textContent = Math.round(next).toLocaleString();
          pushHass();
        }, 800);
      });

      rebuild();
    </script>
  </body>
</html>
